<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据洞察 - 课程知识图谱社区</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fafcfd;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --blue: #3b82f6;
            --violet: #8b5cf6;
            --amber: #f59e0b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --stripe-bg: #f8fafc;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 18px;
            --radius-sm: 12px;
            --radius-pill: 9999px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Noto Sans SC', sans-serif;
            --font-display: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        }

        body.dark {--bg:#0f1116;--card:#1a1d26;--text:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--border:#2d3340;--border-light:#222836;--stripe-bg:#1e2030;--shadow-sm:0 1px 2px rgba(0,0,0,0.3);--shadow:0 1px 3px rgba(0,0,0,0.4);--shadow-md:0 4px 12px rgba(0,0,0,0.45);--shadow-lg:0 8px 30px rgba(0,0,0,0.5)}
        body.dark .navbar{background:rgba(15,17,22,.9);border-color:rgba(255,255,255,.06)}
        body.dark .nav-links a:hover,body.dark .nav-links a.active{color:var(--blue);background:rgba(59,130,246,.1)}
        body.dark .card{background:var(--card);border-color:var(--border)}
        body.dark th{background:var(--card)}
        body.dark tr:hover td{background:rgba(255,255,255,.02)}
        body.dark .rank-num{background:#1a2740}
        body.dark .section-divider .title{color:var(--text)}
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 64px;
            padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        .navbar .logo a {
            font-family: var(--font-display); font-size: 18px; font-weight: 600;
            text-decoration: none; color: var(--text);
            display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px;
        }
        .navbar .logo a .logo-dot {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px;
        }
        .nav-links { display: flex; align-items: center; gap: 2px; }
        .nav-links a {
            font-family: var(--font-sans);
            color: var(--text-secondary); text-decoration: none; font-size: 14px;
            font-weight: 500; padding: 6px 16px; border-radius: var(--radius-pill);
            transition: all var(--transition);
        }
        .nav-links a:hover { color: var(--text); background: rgba(59, 130, 246, 0.05); }
        .nav-links a.active {
            color: var(--blue); background: rgba(59, 130, 246, 0.06);
        }

        /* Container */
        .container {
            position: relative; z-index: 1; max-width: 1240px;
            margin: 0 auto; padding: 90px 24px 50px;
        }
        .page-header { margin-bottom: 32px; }
        .page-title {
            font-family: var(--font-display); font-size: 32px; font-weight: 700;
            color: var(--text); letter-spacing: -0.5px;
        }
        .page-subtitle {
            font-size: 14px; color: var(--text-muted); margin-top: 6px;
        }

        /* Layout */
        .grid-2 {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-bottom: 20px;
        }
        @media (max-width:1024px) { .grid-2 { grid-template-columns: 1fr; } }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow); }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px;
        }
        .card-title {
            font-family: var(--font-display); font-size: 16px; font-weight: 600;
            color: var(--text); display: flex; align-items: center; gap: 10px;
        }
        .card-badge {
            font-size: 10px; font-weight: 500; letter-spacing: 0.5px;
            padding: 3px 10px; border-radius: var(--radius-pill);
            background: var(--stripe-bg); color: var(--text-muted);
            border: 1px solid var(--border-light);
        }
        .chart-container { position: relative; height: 300px; width: 100%; }

        /* Summary cards */
        .summary-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 28px;
        }
        @media (max-width:1024px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width:600px) { .summary-grid { grid-template-columns: 1fr; } }

        .summary-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 24px; text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        .summary-card:nth-child(1) { border-top: 3px solid var(--blue); }
        .summary-card:nth-child(2) { border-top: 3px solid var(--violet); }
        .summary-card:nth-child(3) { border-top: 3px solid var(--amber); }
        .summary-card:nth-child(4) { border-top: 3px solid #10b981; }
        .summary-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .summary-card .number {
            font-family: var(--font-display); font-size: 40px; font-weight: 700;
            color: var(--text); line-height: 1.2;
            letter-spacing: -1px;
        }
        .summary-card .label {
            font-size: 13px; color: var(--text-muted); margin-top: 6px;
        }

        /* Table */
        .table-wrap { max-height: 340px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            padding: 10px 14px; text-align: left;
            font-size: 11px; font-weight: 500; color: var(--text-muted);
            border-bottom: 2px solid var(--border-light);
            position: sticky; top: 0; background: var(--card); z-index: 1;
        }
        td {
            padding: 10px 14px; border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary);
        }
        tr:hover td { background: var(--stripe-bg); }
        .rank-num {
            display: inline-flex; width: 26px; height: 26px;
            align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 13px; font-weight: 700;
            border-radius: 6px; background: #f1f5f9; color: var(--text-muted);
        }
        tr:nth-child(1) .rank-num { background: #eff6ff; color: var(--blue); }
        tr:nth-child(2) .rank-num { background: #f5f3ff; color: var(--violet); }
        tr:nth-child(3) .rank-num { background: #fffbeb; color: var(--amber); }
        .val-highlight { color: var(--blue); font-weight: 600; }

        /* Bottom stats */
        .bottom-stats {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 32px;
            display: flex; justify-content: space-around; align-items: center;
            flex-wrap: wrap; gap: 16px; margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        .bottom-stat-item { text-align: center; }
        .bottom-stat-item .bs-num {
            font-family: var(--font-display); font-size: 32px; font-weight: 700;
            color: var(--text); letter-spacing: -0.5px;
        }
        .bottom-stat-item .bs-label {
            font-size: 12px; color: var(--text-muted); margin-top: 2px;
        }

        /* Loading */
        .loading {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 50px 0;
        }
        .loading .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border-light);
            border-top-color: var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading span { font-size: 14px; color: var(--text-muted); }
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Section divider */
        .section-divider {
            margin-bottom: 14px; display: flex; align-items: center; gap: 14px;
        }
        .section-divider .line {
            display: inline-block; width: 4px; height: 26px; border-radius: 2px;
        }
        .section-divider .title {
            font-family: var(--font-display); font-size: 20px; font-weight: 600;
            color: var(--text);
        }
        .line-blue { background: var(--blue); }
        .line-violet { background: var(--violet); }
        .line-amber { background: var(--amber); }

        @media (max-width:768px) { .navbar { padding: 0 20px; } }
    </style>
</head>
<body>

    <div id="navbar"></div>
<script src="/js/navbar.js"></script>

    <div class="container">
        <div class="page-header">
            <div class="page-title">数据洞察</div>
            <div class="page-subtitle">知识点热度、课程评价与多维统计</div>
        </div>

        <div class="summary-grid" id="summaryGrid">
            <div class="summary-card"><div class="number" data-target="0">0</div><div class="label">总课程数</div></div>
            <div class="summary-card"><div class="number" data-target="0">0</div><div class="label">总知识点数</div></div>
            <div class="summary-card"><div class="number" data-target="0">0</div><div class="label">总关系数</div></div>
            <div class="summary-card"><div class="number" data-target="0">0</div><div class="label">点评总数</div></div>
        </div>

        <div class="section-divider">
            <span class="line line-blue"></span>
            <span class="title">知识点热度分析</span>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">TOP 10 知识点</div>
                    <span class="card-badge">BAR CHART</span>
                </div>
                <div class="chart-container"><canvas id="degreeChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-title">四维度知识点分布</div>
                    <span class="card-badge">DOUGHNUT</span>
                </div>
                <div class="chart-container"><canvas id="dimensionChart"></canvas></div>
            </div>
        </div>

        <div class="section-divider" style="margin-top:4px;">
            <span class="line line-amber"></span>
            <span class="title">课程分析</span>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">共享知识点最多的课程对</div>
                    <span class="card-badge">TABLE</span>
                </div>
                <div id="sharedContent">
                    <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-title">课程评分排行</div>
                    <span class="card-badge">HORIZONTAL BAR</span>
                </div>
                <div class="chart-container"><canvas id="ratingChart"></canvas></div>
            </div>
        </div>

        <div class="section-divider" style="margin-top:4px;">
            <span class="line line-green"></span>
            <span class="title">课程难度排行</span>
        </div>

        <div class="card" style="margin-top:16px;">
            <div class="card-header">
                <div class="card-title">综合难度排行榜</div>
                <span class="card-badge">RANKING</span>
            </div>
            <div id="difficultyContent">
                <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
            </div>
        </div>

        <div class="bottom-stats">
            <div class="bottom-stat-item"><div class="bs-num" id="bsCourses">--</div><div class="bs-label">总课程</div></div>
            <div class="bottom-stat-item"><div class="bs-num" id="bsKP">--</div><div class="bs-label">知识点</div></div>
            <div class="bottom-stat-item"><div class="bs-num" id="bsRelations">--</div><div class="bs-label">关系</div></div>
            <div class="bottom-stat-item"><div class="bs-num" id="bsSchool">1</div><div class="bs-label">南京大学信息管理学院</div></div>
        </div>
    </div>

    <script>
        // Chart.js color configuration - updated for clean light theme
        const BLUE_GRADIENT_START = 'rgba(59, 130, 246, 0.15)';
        const BLUE_GRADIENT_END = 'rgba(59, 130, 246, 0.55)';
        const AMBER_GRADIENT_START = 'rgba(245, 158, 11, 0.12)';
        const AMBER_GRADIENT_END = 'rgba(245, 158, 11, 0.45)';
        const DIMENSION_COLORS = {
            '文化': '#3b82f6', '机构': '#8b5cf6', '个人': '#f59e0b', '计算': '#10b981',
        };
        const fontFamily = "'Noto Sans SC', 'Space Grotesk', sans-serif";

        function createGradient(ctx, chartArea, c1, c2) {
            const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
            g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
        }
        function createHoriGradient(ctx, chartArea, c1, c2) {
            const g = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
            g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
        }

        async function loadDegreeChart() {
            try {
                const res = await fetch('/api/analysis/degree'); const d = await res.json();
                if (!d.success || !d.data || d.data.length===0) return;
                const data = d.data.slice(0,10);
                const ctx = document.getElementById('degreeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(x=>x.name),
                        datasets: [{
                            label: '覆盖课程数', data: data.map(x=>x.degree),
                            backgroundColor: function(context) {
                                const c = context.chart; if (!c.chartArea) return 'rgba(59,130,246,0.3)';
                                return createGradient(c.ctx, c.chartArea, BLUE_GRADIENT_START, BLUE_GRADIENT_END);
                            },
                            borderColor: '#3b82f6', borderWidth: 1.5, borderRadius: 8,
                        }]
                    },
                    options: {
                        responsive:true, maintainAspectRatio:false,
                        plugins: {
                            legend:{display:false},
                            tooltip:{
                                backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#1e293b', bodyColor:'#64748b',
                                titleFont:{family:fontFamily,weight:'600'}, bodyFont:{family:fontFamily},
                                borderColor:'#e2e8f0', borderWidth:1, padding:12, cornerRadius:8,
                                callbacks:{label:function(c){return '覆盖 '+c.parsed.y+' 门课程';}}
                            }
                        },
                        scales:{
                            y:{beginAtZero:true, ticks:{stepSize:1,color:'#94a3b8',font:{family:fontFamily}}, grid:{color:'#f1f5f9'}},
                            x:{ticks:{color:'#94a3b8',font:{family:fontFamily,size:11},maxRotation:40}, grid:{display:false}}
                        },
                        animation:{duration:1000}
                    }
                });
            } catch(e) {}
        }

        async function loadDimensionChart() {
            try {
                const res = await fetch('/api/analysis/dimension-distribution'); const d = await res.json();
                if (!d.success || !d.data || d.data.length===0) return;
                const ctx = document.getElementById('dimensionChart').getContext('2d');
                new Chart(ctx, {
                    type:'doughnut',
                    data:{
                        labels: d.data.map(x=>x.dimension),
                        datasets:[{
                            data: d.data.map(x=>x.count),
                            backgroundColor: d.data.map(x=>DIMENSION_COLORS[x.dimension]||'#94a3b8'),
                            borderColor:'#ffffff', borderWidth:3, hoverOffset:14,
                        }]
                    },
                    options:{
                        responsive:true, maintainAspectRatio:false, cutout:'62%',
                        plugins:{
                            legend:{position:'bottom', labels:{color:'#64748b',font:{family:fontFamily,size:12},padding:16,usePointStyle:true,pointStyleWidth:8}},
                            tooltip:{
                                backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#1e293b', bodyColor:'#64748b',
                                titleFont:{family:fontFamily,weight:'600'}, bodyFont:{family:fontFamily},
                                borderColor:'#e2e8f0', borderWidth:1, padding:12, cornerRadius:8,
                                callbacks:{label:function(c){const t=c.dataset.data.reduce((a,b)=>a+b,0);const p=((c.parsed/t)*100).toFixed(1);return c.label+': '+c.parsed+' 个 ('+p+'%)';}}
                            }
                        },
                        animation:{animateRotate:true, duration:1400}
                    }
                });
            } catch(e) {}
        }

        async function loadRatingChart() {
            try {
                const res = await fetch('/api/analysis/rating-stats'); const d = await res.json();
                if (!d.success || !d.data || d.data.length===0) return;
                const data = d.data.sort((a,b)=>b.avg_score-a.avg_score);
                const ctx = document.getElementById('ratingChart').getContext('2d');
                new Chart(ctx, {
                    type:'bar',
                    data:{
                        labels: data.map(x=>x.name),
                        datasets:[{
                            label:'平均评分', data: data.map(x=>x.avg_score),
                            backgroundColor: function(context) {
                                const c = context.chart; if (!c.chartArea) return 'rgba(245,158,11,0.3)';
                                return createHoriGradient(c.ctx, c.chartArea, AMBER_GRADIENT_START, AMBER_GRADIENT_END);
                            },
                            borderColor:'#f59e0b', borderWidth:1.5, borderRadius:8,
                        }]
                    },
                    options:{
                        responsive:true, maintainAspectRatio:false, indexAxis:'y',
                        plugins:{
                            legend:{display:false},
                            tooltip:{
                                backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#1e293b', bodyColor:'#64748b',
                                titleFont:{family:fontFamily,weight:'600'}, bodyFont:{family:fontFamily},
                                borderColor:'#e2e8f0', borderWidth:1, padding:12, cornerRadius:8,
                                callbacks:{label:function(c){const idx=c.dataIndex;return '评分: '+c.parsed.x.toFixed(2)+'  ('+(data[idx].rating_count||0)+' 人评价)';}}
                            }
                        },
                        scales:{
                            x:{beginAtZero:true, max:5, ticks:{color:'#94a3b8',font:{family:fontFamily},callback:function(v){return ''+v.toFixed(1)}}, grid:{color:'#f1f5f9'}},
                            y:{ticks:{color:'#94a3b8',font:{family:fontFamily,size:11}}, grid:{display:false}}
                        },
                        animation:{duration:1200}
                    }
                });
            } catch(e) {}
        }

        async function loadDifficultyRanking() {
            try {
                const res = await fetch('/api/analysis/difficulty-ranking'); const d = await res.json();
                if (!d.success || !d.data || d.data.length===0) return;
                const html = `<table style="width:100%;border-collapse:collapse;font-size:14px;">
                    <tr style="border-bottom:2px solid var(--border-light);"><th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--text-muted);">#</th>
                    <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--text-muted);">课程</th>
                    <th style="padding:10px 14px;font-size:11px;color:var(--text-muted);">考试难度</th>
                    <th style="padding:10px 14px;font-size:11px;color:var(--text-muted);">作业量</th>
                    <th style="padding:10px 14px;font-size:11px;color:var(--text-muted);">综合得分</th>
                    <th style="padding:10px 14px;font-size:11px;color:var(--text-muted);">评分人数</th></tr>
                    ${d.data.map((r,i)=>`<tr style="border-bottom:1px solid var(--border-light);${i%2===0?'background:var(--stripe-bg)':''}">
                        <td style="padding:10px 14px;font-weight:600;color:${i<3?'var(--amber)':'var(--text-muted)'};">${i+1}</td>
                        <td style="padding:10px 14px;font-weight:500;color:var(--text);">${r.name}</td>
                        <td style="padding:10px 14px;text-align:center;color:${r.exam_difficulty>=3.5?'#ef4444':r.exam_difficulty>=2.5?'var(--amber)':'var(--green)'};">${r.exam_difficulty}</td>
                        <td style="padding:10px 14px;text-align:center;color:${r.workload>=3.5?'#ef4444':r.workload>=2.5?'var(--amber)':'var(--green)'};">${r.workload}</td>
                        <td style="padding:10px 14px;text-align:center;font-weight:700;color:var(--text);">${r.difficulty_score}</td>
                        <td style="padding:10px 14px;text-align:center;color:var(--text-muted);">${r.rating_count}</td>
                    </tr>`).join('')}
                </table>`;
                document.getElementById('difficultyContent').innerHTML = html;
            } catch(e) { document.getElementById('difficultyContent').innerHTML = '<div class="empty" style="text-align:center;padding:30px;color:var(--text-muted);">加载失败</div>'; }
        }

        async function loadSharedKP() {
            try {
                const res = await fetch('/api/analysis/shared-kp'); const d = await res.json();
                const container = document.getElementById('sharedContent');
                if (!d.success || !d.data || d.data.length===0) {
                    container.innerHTML = '<div class="empty-state"><div>暂无共享数据</div><div style="font-size:12px;margin-top:4px;">每门课程的知识点相对独立</div></div>';
                    return;
                }
                container.innerHTML = `<div class="table-wrap"><table><tr><th>#</th><th>课程对</th><th style="text-align:center;">共享知识点数</th></tr>
                    ${d.data.map((x,i)=>{
                        return `<tr><td><span class="rank-num">${i+1}</span></td><td><span style="color:var(--text);">${x.course_a}</span><span style="color:var(--text-muted);margin:0 6px;">&#8596;</span><span style="color:var(--text);">${x.course_b}</span></td><td style="text-align:center;"><span class="val-highlight">${x.shared_count}</span> 个</td></tr>`;
                    }).join('')}
                </table></div>`;
            } catch(e) { document.getElementById('sharedContent').innerHTML = '<div class="empty-state"><div>加载失败</div></div>'; }
        }

        async function loadSummary() {
            try {
                const [degRes, dimRes, ratingRes, sharedRes] = await Promise.all([
                    fetch('/api/analysis/degree').then(r=>r.json()).catch(()=>({success:false})),
                    fetch('/api/analysis/dimension-distribution').then(r=>r.json()).catch(()=>({success:false})),
                    fetch('/api/analysis/rating-stats').then(r=>r.json()).catch(()=>({success:false})),
                    fetch('/api/analysis/shared-kp').then(r=>r.json()).catch(()=>({success:false})),
                ]);
                let totalCourses = 0, totalKP = 0;
                if (ratingRes.success && ratingRes.data) totalCourses = ratingRes.data.length;
                if (degRes.success && degRes.data) totalKP = degRes.data.length;

                try {
                    const statsRes = await fetch('/api/analysis/summary-stats').then(r=>r.json());
                    if (statsRes.success && statsRes.data) {
                        const s = statsRes.data;
                        setSummaryNum(0, s.total_courses || totalCourses);
                        setSummaryNum(1, s.total_knowledge_points || totalKP);
                        setSummaryNum(2, s.total_relations || '--');
                        setSummaryNum(3, s.total_reviews || '--');
                        document.getElementById('bsCourses').textContent = s.total_courses || totalCourses || '--';
                        document.getElementById('bsKP').textContent = s.total_knowledge_points || totalKP || '--';
                        document.getElementById('bsRelations').textContent = s.total_relations || '--';
                        return;
                    }
                } catch(e) {}
                setSummaryNum(0, totalCourses); setSummaryNum(1, totalKP); setSummaryNum(2, '--'); setSummaryNum(3, '--');
                document.getElementById('bsCourses').textContent = totalCourses || '--';
                document.getElementById('bsKP').textContent = totalKP || '--';
            } catch(e) {}
        }

        function setSummaryNum(index, value) {
            const cards = document.querySelectorAll('.summary-card .number');
            if (cards[index]) {
                cards[index].setAttribute('data-target', value);
                animateNumber(cards[index], value);
            }
        }

        function animateNumber(el, target) {
            if (target === '--' || typeof target !== 'number') { el.textContent = target || '--'; return; }
            const startVal = parseInt(el.textContent) || 0;
            if (startVal === target) { el.textContent = target; return; }
            const duration = 1000; const startTime = performance.now();
            function step(ts) {
                const progress = Math.min((ts - startTime) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 4);
                el.textContent = Math.floor(startVal + (target - startVal) * eased);
                if (progress < 1) requestAnimationFrame(step);
                else el.textContent = target;
            }
            requestAnimationFrame(step);
        }

        (function(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');})();
        window.toggleTheme=function(){var d=document.body.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');};
        document.addEventListener('DOMContentLoaded', function() {
            loadDegreeChart(); loadDimensionChart(); loadRatingChart(); loadDifficultyRanking();
            loadSharedKP(); loadSummary();
        });
    </script>
</body>
</html>
