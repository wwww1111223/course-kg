<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>知识星图 · NJU 课程星图</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/standalone/umd/vis-network.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:rgba(59,130,246,0.15)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}
:root{
  --bg:#fafcfd;--card:#fff;--text:#1e293b;--sub:#64748b;--muted:#94a3b8;
  --blue:#3b82f6;--blue-lt:#eff6ff;--violet:#8b5cf6;--violet-lt:#f5f3ff;
  --amber:#f59e0b;--green:#10b981;--pink:#ec4899;
  --course:#ff6b6b;--kp:#3b82f6;--radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 12px 40px rgba(0,0,0,.06);
}
body.dark{--bg:#0f1116;--card:#1a1d26;--text:#e2e8f0;--sub:#94a3b8;--muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 12px 40px rgba(0,0,0,.4)}
body.dark .navbar{background:rgba(15,17,22,.9);border-color:rgba(255,255,255,.05)}
body.dark .panel-card{background:var(--card);border-color:rgba(255,255,255,.05)}
body.dark input{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:var(--text)}
body.dark #togglePanelBtn,body.dark #togglePanelBtn2{background:var(--card);color:var(--sub);border-color:rgba(255,255,255,.12)}
body.dark .graph-wrapper{background:var(--card);border-color:rgba(255,255,255,.05)}
body.dark .right-panel{background:var(--card);border-color:rgba(255,255,255,.05)}
body.dark .bottom-bar{background:var(--card);border-color:rgba(255,255,255,.05)}
html,body{height:100%}
body{
  font-family:'Noto Sans SC','Space Grotesk',sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;
}

.navbar{
  height:56px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0;z-index:100;
}
.navbar .logo a{font-size:18px;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px}
.navbar .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;padding:5px 14px;border-radius:100px;transition:.25s}
.nav-links a:hover{color:var(--blue);background:var(--blue-lt)}
.nav-links a.active{color:var(--blue);background:var(--blue-lt)}
.nav-status{font-size:12px;color:var(--muted)}

.app{flex:1;display:flex;overflow:hidden;padding:10px;gap:10px;position:relative}

.left-panel{width:260px;min-width:260px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;transition:all .4s}
.left-panel.collapsed{width:0;min-width:0;overflow:hidden;opacity:0}
.panel-card{background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);flex-shrink:0}
.panel-card h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:12px}

.course-select-wrap{position:relative}
.course-select-trigger{width:100%;padding:9px 12px;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.08);border-radius:10px;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit;transition:.25s}
.course-select-trigger:hover,.course-select-trigger.open{border-color:var(--blue)}
.course-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:10px;max-height:200px;overflow-y:auto;z-index:50;display:none;padding:4px;box-shadow:var(--shadow-lg)}
.course-dropdown.show{display:block}
.course-dropdown label{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px;color:var(--text);cursor:pointer;transition:.15s}
.course-dropdown label:hover{background:var(--blue-lt)}

.dim-filters{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.dim-btn{padding:5px 12px;border-radius:100px;border:1px solid rgba(0,0,0,.08);background:transparent;color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;transition:.25s;font-family:inherit}
.dim-btn:hover{background:rgba(0,0,0,.03)}
.dim-btn.active{color:#fff;font-weight:600}
.dim-btn.dim-culture.active{background:var(--amber);border-color:var(--amber)}
.dim-btn.dim-institution.active{background:var(--violet);border-color:var(--violet)}
.dim-btn.dim-personal.active{background:var(--blue);border-color:var(--blue)}
.dim-btn.dim-computation.active{background:var(--green);border-color:var(--green)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-top:4px}
.toggle-switch{width:36px;height:20px;border-radius:10px;background:rgba(0,0,0,.1);cursor:pointer;transition:.3s;position:relative}
.toggle-switch.on{background:var(--blue)}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.3s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toggle-switch.on .knob{left:18px}

.search-box{display:flex;gap:6px;margin-top:4px}
.search-box input{flex:1;padding:8px 12px;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.08);border-radius:100px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:.25s}
.search-box input:focus{border-color:var(--blue)}
.btn{background:var(--blue);color:#fff;border:none;padding:7px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:.25s;font-family:inherit}
.btn:hover{opacity:.9}
.btn.sec{background:rgba(0,0,0,.04);color:var(--sub)}

.graph-wrapper{flex:1;background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
#graphContainer{width:100%;height:100%}

.right-panel{width:290px;min-width:290px;background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);overflow-y:auto;display:none}
.right-panel.show{display:block}
.right-panel h4{font-size:16px;font-weight:600;margin-bottom:4px}
.right-panel .meta{font-size:12px;color:var(--muted);margin-bottom:12px}
.right-panel .detail-item{font-size:13px;color:var(--sub);padding:6px 0;border-bottom:1px solid rgba(0,0,0,.03)}
.right-panel .detail-item:last-child{border:none}
.right-panel textarea{width:100%;padding:10px;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.08);border-radius:10px;color:var(--text);font-size:13px;resize:vertical;min-height:60px;outline:none;font-family:inherit;margin-top:8px}
.right-panel textarea:focus{border-color:var(--blue)}

.bottom-bar{background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);padding:8px 16px;display:flex;align-items:center;gap:20px;font-size:13px;color:var(--muted);flex-shrink:0;margin:10px 10px 0}
.bottom-bar strong{color:var(--text)}
</style>
</head>
<body>

<div id="navbar"></div>
<script src="/js/navbar.js"></script>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div class="panel-card">
      <h3>课程筛选</h3>
      <div class="course-select-wrap">
        <div class="course-select-trigger" onclick="toggleCourseDropdown()">
          <span id="courseSelectLabel">全部课程</span><span class="arrow">▾</span>
        </div>
        <div class="course-dropdown" id="courseDropdown"></div>
      </div>
    </div>
    <div class="panel-card">
      <h3>维度过滤</h3>
      <div class="dim-filters">
        <button class="dim-btn dim-culture" onclick="toggleDimFilter(this,'culture')">文化</button>
        <button class="dim-btn dim-institution" onclick="toggleDimFilter(this,'institution')">机构</button>
        <button class="dim-btn dim-personal" onclick="toggleDimFilter(this,'personal')">个人</button>
        <button class="dim-btn dim-computation" onclick="toggleDimFilter(this,'computation')">计算</button>
      </div>
    </div>
    <div class="panel-card">
      <h3>节点显示</h3>
      <div class="toggle-row"><span>课程节点</span><div class="toggle-switch on" onclick="this.classList.toggle('on');toggleNodeType('Course')"><div class="knob"></div></div></div>
      <div class="toggle-row"><span>知识点节点</span><div class="toggle-switch on" onclick="this.classList.toggle('on');toggleNodeType('KnowledgePoint')"><div class="knob"></div></div></div>
    </div>
    <div class="panel-card">
      <h3>搜索节点</h3>
      <div class="search-box"><input id="nodeSearch" placeholder="搜索..." onkeydown="if(event.key==='Enter')searchNode()"><button class="btn" onclick="searchNode()">搜索</button></div>
    </div>
    <button id="togglePanelBtn" onclick="toggleLeftPanel()" style="display:block;width:100%;margin-top:8px;background:var(--card);color:var(--sub);border:1px solid rgba(0,0,0,0.12);padding:8px 0;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">&#x25C0; 收起面板</button>
  </div>
  <button id="togglePanelBtn2" onclick="toggleLeftPanel()" style="display:none;position:absolute;left:10px;top:80px;z-index:50;background:var(--card);color:var(--sub);border:1px solid rgba(0,0,0,0.12);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">&#x25B6;</button>

  <div class="graph-wrapper"><div id="graphContainer"></div></div>

  <div class="right-panel" id="rightPanel"></div>
</div>

<div class="bottom-bar">
  <span>节点：<strong id="nodeCount">0</strong></span>
  <span>关系：<strong id="linkCount">0</strong></span>
  <button class="btn sec" onclick="resetGraph()">重置布局</button>
  <button class="btn sec" onclick="exportPNG()">导出PNG</button>
</div>

<script>
// 主题同步
(function(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');})();
window.toggleGlobalTheme=function(){var d=document.body.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');};

let network,nodesData,edgesData,allNodes=[],allLinks=[],kpNodeIdMap={};

const nodeColors={
  Course:{bg:'#ff6b6b',bd:'#e05a5a',shape:'box'},
  KnowledgePoint:{bg:'#3b82f6',bd:'#2563eb',shape:'ellipse'},
  Dimension:{bg:'#10b981',bd:'#059669',shape:'diamond'}
};

async function init(){
  try{
    const[graphRes,coursesRes]=await Promise.all([
      fetch('/api/graph').then(r=>r.json()),
      fetch('/api/courses').then(r=>r.json())
    ]);
    if(graphRes.success){
      allNodes=graphRes.nodes;allLinks=graphRes.links;
      buildGraph(allNodes,allLinks);
      document.getElementById('nodeCount').textContent=allNodes.length;
      document.getElementById('linkCount').textContent=allLinks.length;
    }
    if(coursesRes.success)buildCourseDropdown(coursesRes.courses);
  }catch(e){document.getElementById('graphContainer').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">加载失败</div>'}
}

function buildGraph(nodes,links){
  const vNodes=nodes.map(n=>{
    const c=nodeColors[n.type]||nodeColors.KnowledgePoint;
    return{id:n.id,label:n.label,title:n.label,shape:c.shape,color:{background:c.bg,border:c.bd,highlight:{background:'#fbbf24',border:'#d97706'}},font:{color:'#1e293b',size:n.type==='Course'?15:13,face:'Noto Sans SC'},size:n.type==='Course'?26:18,borderWidth:2};
  });
  const vEdges=links.map(l=>({
    from:l.source,to:l.target,
    color:{color:l.type==='HAS_KNOWLEDGE'?'rgba(59,130,246,0.2)':'rgba(0,0,0,0.08)'},
    width:1.5,arrows:{to:{enabled:true,scaleFactor:.5}},smooth:{type:'curvedCW',roundness:.1}
  }));

  nodesData=new vis.DataSet(vNodes);edgesData=new vis.DataSet(vEdges);
  const container=document.getElementById('graphContainer');
  network=new vis.Network(container,{nodes:nodesData,edges:edgesData},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-35,centralGravity:.005,springLength:160,springConstant:.02,damping:.4},stabilization:{iterations:150}},
    interaction:{hover:true,navigationButtons:true},
    edges:{smooth:{type:'continuous'}}
  });

  network.on('click',p=>{if(p.nodes.length>0)showDetail(p.nodes[0])});
}

function showDetail(nodeId){
  const node=allNodes.find(n=>n.id===nodeId);
  if(!node)return;
  const panel=document.getElementById('rightPanel');
  panel.classList.add('show');
  let html=`<h4>${node.label}</h4><div class="meta">${node.type}</div>`;
  if(node.type==='Course'){
    html+=`<div class="detail-item">学分：${node.credit||'—'}</div>`;
    html+=`<div class="detail-item">中图号：${node.clc_number||'—'}</div>`;
    html+=`<div class="detail-item">院系：${node.department||'—'}</div>`;
    html+=`<div class="detail-item"><a href="/course/${nodeId}" style="color:var(--blue)">查看课程详情 →</a></div>`;
  }else if(node.type==='KnowledgePoint'){
    html+=`<div class="detail-item">${node.description||''}</div>`;
    html+=`<div class="detail-item">学科：${node.subject_category||''}</div>`;
    html+=`<textarea placeholder="添加个人标注..." id="kpAnnotation"></textarea><button class="btn" onclick="saveAnnotation(${nodeId})" style="margin-top:8px">保存标注</button>`;
  }
  panel.innerHTML=html;
}

async function saveAnnotation(nodeId){
  var content=document.getElementById('kpAnnotation').value.trim();
  if(!content)return;
  var node=allNodes.find(function(n){return n.id===nodeId;});
  var kpId=node&&node.db_id?node.db_id:nodeId;
  await fetch('/api/knowledge-points/'+kpId+'/annotate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})});
  alert('标注已保存');
}

function toggleCourseDropdown(){
  document.getElementById('courseDropdown').classList.toggle('show');
}
function buildCourseDropdown(courses){
  document.getElementById('courseDropdown').innerHTML=courses.map(c=>`<label><input type="checkbox" checked onchange="filterByCourse()" value="${c.id}">${c.name}</label>`).join('');
}
function filterByCourse(){
  if(!network)return;
  var checks=document.querySelectorAll('#courseDropdown input[type=checkbox]');
  var visibleCourseIds=new Set();
  checks.forEach(function(cb){if(cb.checked)visibleCourseIds.add(parseInt(cb.value));});
  // 全部选中 → 显示所有
  if(visibleCourseIds.size===checks.length){
    nodesData.forEach(function(n){nodesData.update({id:n.id,hidden:false});});
    return;
  }
  // 构建可见课程所关联的 KP 集合
  var visibleKpIds=new Set();
  allLinks.forEach(function(l){
    if(visibleCourseIds.has(l.source)||visibleCourseIds.has(l.target)){
      visibleKpIds.add(l.source);visibleKpIds.add(l.target);
    }
  });
  // 合并可见的课程 ID 和 KP ID
  var allVisible=new Set([...visibleCourseIds,...visibleKpIds]);
  nodesData.forEach(function(n){
    nodesData.update({id:n.id,hidden:!allVisible.has(n.id)});
  });
}
function toggleDimFilter(el,dim){
  el.classList.toggle('active');
  applyDimFilter();
}
function applyDimFilter(){
  if(!nodesData)return;
  var activeDims=[];
  document.querySelectorAll('.dim-btn').forEach(function(b){
    if(b.classList.contains('active')){
      if(b.classList.contains('dim-culture'))activeDims.push('文化');
      else if(b.classList.contains('dim-institution'))activeDims.push('机构');
      else if(b.classList.contains('dim-personal'))activeDims.push('个人');
      else if(b.classList.contains('dim-computation'))activeDims.push('计算');
    }
  });
  nodesData.forEach(function(n){
    var cn=allNodes.find(function(x){return x.id===n.id;});
    if(!cn||cn.type!=='KnowledgePoint')return;
    if(activeDims.length===0){nodesData.update({id:n.id,hidden:false});return;}
    // 检查知识点的维度（后端返回的 dimension 字段）
    var kpDim = cn.dimension || cn.subject_category || '';
    var match = activeDims.indexOf(kpDim) >= 0;
    nodesData.update({id:n.id,hidden:!match});
  });
}
// 跟踪节点类型的显示状态（默认都显示）
var nodeTypeVisible={Course:true,KnowledgePoint:true};
function toggleNodeType(type){
  nodeTypeVisible[type]=!nodeTypeVisible[type];
  if(!nodesData)return;
  nodesData.forEach(function(n){
    var cn=allNodes.find(function(x){return x.id===n.id;});
    if(!cn)return;
    if(cn.type===type)nodesData.update({id:n.id,hidden:!nodeTypeVisible[type]});
  });
}
function searchNode(){
  const q=document.getElementById('nodeSearch').value.trim();
  if(!q||!network)return;
  fetch(`/api/graph/search?q=${encodeURIComponent(q)}`).then(r=>r.json()).then(d=>{
    if(d.success&&d.results.length>0){network.selectNodes([d.results[0].id]);network.focus(d.results[0].id,{scale:1.5,animation:true})}
  });
}
function toggleLeftPanel(){
  var panel=document.getElementById('leftPanel');
  var collapsed=panel.classList.toggle('collapsed');
  var btn1=document.getElementById('togglePanelBtn');
  var btn2=document.getElementById('togglePanelBtn2');
  if(collapsed){
    btn1.style.display='none';
    btn2.style.display='block';
  }else{
    btn1.style.display='block';
    btn2.style.display='none';
  }
}
function resetGraph(){if(network){network.fit({animation:true});network.unselectAll()}}
function exportPNG(){
  const canvas=document.querySelector('#graphContainer canvas');
  if(canvas){const a=document.createElement('a');a.download='知识星图.png';a.href=canvas.toDataURL();a.click()}
}

init();
</script>
</body>
</html>
