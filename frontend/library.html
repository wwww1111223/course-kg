<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的藏书阁 - NJU 课程星图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafcfd;--bg2:#f4f7fc;--card:#fff;--card2:#f8fafc;
  --text:#1e293b;--text2:#334155;--sub:#64748b;--muted:#94a3b8;
  --accent:#3b82f6;--accent2:#2563eb;
  --gold:#3b82f6;--gold-lt:rgba(59,130,246,0.08);--gold-glow:0 0 20px rgba(59,130,246,0.15);
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --shadow:0 1px 3px rgba(0,0,0,0.04);--shadow-md:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 12px 40px rgba(0,0,0,0.08);
  --nav-bg:rgba(255,255,255,0.85);--nav-border:rgba(0,0,0,0.05);
  --shelf-bg:rgba(0,0,0,0.02);--shelf-border:rgba(0,0,0,0.06);
  --scrollbar:rgba(0,0,0,0.1);
  --dim-blue:#3b82f6;--dim-purple:#8b5cf6;--dim-gold:#f59e0b;--dim-green:#10b981;
  --font-sans:'Noto Sans SC',sans-serif;
  --font-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --radius:18px;--radius-sm:12px;--radius-pill:9999px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
}

/* ===== Theme: Dark Gold (暗调鎏金) ===== */
.theme-dark-gold{
  --bg:#0a0a12;--bg2:#12121f;--card:#1a1a2e;--card2:#22223a;
  --text:#e8d5b7;--text2:#c9b28b;--sub:#a09080;--muted:#6b5d4e;
  --accent:#c9a84c;--accent2:#e8c85a;
  --gold:#c9a84c;--gold-lt:rgba(201,168,76,0.12);--gold-glow:0 0 20px rgba(201,168,76,0.3);
  --border:rgba(201,168,76,0.15);--border2:rgba(201,168,76,0.3);
  --shadow:0 1px 3px rgba(0,0,0,0.4);--shadow-md:0 4px 20px rgba(0,0,0,0.5);--shadow-lg:0 12px 48px rgba(0,0,0,0.6);
  --nav-bg:rgba(10,10,18,0.92);--nav-border:rgba(201,168,76,0.1);
  --shelf-bg:rgba(26,26,46,0.6);--shelf-border:rgba(201,168,76,0.2);
  --scrollbar:rgba(201,168,76,0.2);
  --dim-blue:#3b82f6;--dim-purple:#8b5cf6;--dim-gold:#f59e0b;--dim-green:#10b981;
}
.theme-dark-gold .navbar{background:var(--nav-bg);border-color:var(--nav-border)}
.theme-dark-gold .nav-links a:hover,.theme-dark-gold .nav-links a.active{background:var(--gold-lt);color:var(--gold)}
.theme-dark-gold .theme-btn{border-color:var(--border);color:var(--sub)}
.theme-dark-gold .theme-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-lt)}

/* ===== Theme: Ancient Paper (古籍纸) ===== */
.theme-paper{
  --bg:#f5e6c8;--bg2:#efe0c0;--card:#faf3e0;--card2:#f5ebd0;
  --text:#3c2415;--text2:#5c3a21;--sub:#7a5a3a;--muted:#a08060;
  --accent:#8b4513;--accent2:#a0522d;
  --gold:#8b4513;--gold-lt:rgba(139,69,19,0.08);--gold-glow:0 0 20px rgba(139,69,19,0.15);
  --border:rgba(139,69,19,0.15);--border2:rgba(139,69,19,0.25);
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.08);--shadow-lg:0 12px 40px rgba(0,0,0,0.1);
  --nav-bg:rgba(245,230,200,0.92);--nav-border:rgba(139,69,19,0.12);
  --shelf-bg:rgba(250,243,224,0.7);--shelf-border:rgba(139,69,19,0.15);
  --scrollbar:rgba(139,69,19,0.15);
  --dim-blue:#2563eb;--dim-purple:#7c3aed;--dim-gold:#d97706;--dim-green:#059669;
}
.theme-paper .navbar{background:var(--nav-bg);border-color:var(--nav-border)}
.theme-paper .nav-links a:hover,.theme-paper .nav-links a.active{background:var(--gold-lt);color:var(--accent)}
.theme-paper .theme-btn{border-color:var(--border);color:var(--sub)}
.theme-paper .theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--gold-lt)}

/* ===== Theme: Academic Cool (学术冷调) ===== */
.theme-cool{
  --bg:#0f1729;--bg2:#1a2337;--card:#1e293d;--card2:#263348;
  --text:#e0e8f0;--text2:#c0d0e0;--sub:#8899b0;--muted:#5a6f8a;
  --accent:#4a90d9;--accent2:#7ab8f5;
  --gold:#4a90d9;--gold-lt:rgba(74,144,217,0.1);--gold-glow:0 0 20px rgba(74,144,217,0.25);
  --border:rgba(74,144,217,0.12);--border2:rgba(74,144,217,0.25);
  --shadow:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 20px rgba(0,0,0,0.4);--shadow-lg:0 12px 48px rgba(0,0,0,0.5);
  --nav-bg:rgba(15,23,41,0.92);--nav-border:rgba(74,144,217,0.08);
  --shelf-bg:rgba(30,41,61,0.6);--shelf-border:rgba(74,144,217,0.12);
  --scrollbar:rgba(74,144,217,0.15);
  --dim-blue:#60a5fa;--dim-purple:#a78bfa;--dim-gold:#fbbf24;--dim-green:#34d399;
}
.theme-cool .navbar{background:var(--nav-bg);border-color:var(--nav-border)}
.theme-cool .nav-links a:hover,.theme-cool .nav-links a.active{background:var(--gold-lt);color:var(--accent2)}
.theme-cool .theme-btn{border-color:var(--border);color:var(--sub)}
.theme-cool .theme-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--gold-lt)}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  transition:background 0.4s,color 0.4s;overflow-x:hidden;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* Navbar */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:64px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}
.navbar .logo{font-size:18px;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;font-family:var(--font-display)}
.navbar .logo .logo-dot{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-links a{color:var(--sub);text-decoration:none;font-size:14px;font-weight:500;padding:6px 16px;border-radius:var(--radius-pill);transition:all var(--transition)}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:var(--gold-lt)}
.nav-right{display:flex;align-items:center;gap:8px;position:relative}
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,0.08);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--transition);color:var(--sub)}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--gold-lt)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.user-dropdown{display:none;position:absolute;top:48px;right:0;width:180px;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:14px;box-shadow:var(--shadow-lg);padding:6px;z-index:200}
.user-dropdown.show{display:block}
.user-dropdown a{display:block;padding:10px 14px;color:var(--text);text-decoration:none;font-size:13px;border-radius:10px;transition:background 0.2s}
.user-dropdown a:hover{background:rgba(0,0,0,0.03)}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:90px 24px 50px}

/* ===== Header ===== */
.page-header{text-align:center;margin-bottom:32px;animation:fadeUp 0.5s ease both}
.page-header h1{font-family:var(--font-display);font-size:36px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-header .sub{color:var(--sub);font-size:15px}
.page-header .stats{
  display:inline-flex;align-items:center;gap:20px;
  margin-top:14px;padding:10px 24px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius-pill);
  font-size:14px;color:var(--sub);
}
.page-header .stats strong{color:var(--gold);font-family:var(--font-display);font-size:18px}

/* ===== Filters ===== */
.filter-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:24px;padding:14px 18px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  animation:fadeUp 0.5s ease 0.1s both;
}
.filter-bar .filter-label{font-size:13px;color:var(--muted);font-weight:500;margin-right:4px}
.filter-tab{
  padding:6px 16px;border-radius:var(--radius-pill);font-size:13px;
  font-weight:500;cursor:pointer;border:1px solid var(--border);
  background:transparent;color:var(--sub);transition:all 0.2s;font-family:inherit;
}
.filter-tab:hover{background:var(--gold-lt)}
.filter-tab.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.filter-tab .count{font-size:11px;opacity:0.7;margin-left:4px}

/* ===== Bookshelf ===== */
.bookshelf{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:16px;padding:28px 24px;min-height:400px;
  background:var(--shelf-bg);border:1px solid var(--shelf-border);
  border-radius:var(--radius);position:relative;
  animation:fadeUp 0.5s ease 0.2s both;
}
.bookshelf::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:8px;
  background:linear-gradient(180deg,transparent,var(--shelf-border));
  border-radius:0 0 var(--radius) var(--radius);
  pointer-events:none;
}
.bookshelf.empty{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}

/* Book */
.book{
  position:relative;height:200px;border-radius:4px 4px 2px 2px;
  cursor:pointer;transition:all 0.3s;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding:10px 4px 8px;
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:var(--font-sans);font-size:12px;font-weight:500;
  color:rgba(255,255,255,0.9);letter-spacing:2px;
  user-select:none;overflow:hidden;min-width:0;
}
.book:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:0 12px 32px rgba(0,0,0,0.3);
  z-index:5;
}
.book .book-spine{
  position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent 40%),
              linear-gradient(90deg,rgba(0,0,0,0.15),transparent 20%,transparent 80%,rgba(0,0,0,0.15));
  pointer-events:none;
}
.book .book-title{
  position:relative;z-index:2;line-height:1.3;
  text-shadow:0 1px 3px rgba(0,0,0,0.3);
  overflow:hidden;text-overflow:ellipsis;max-height:160px;
  word-break:break-all;
}
.book .book-star{
  position:absolute;top:4px;right:4px;z-index:3;
  font-size:14px;cursor:pointer;writing-mode:horizontal-tb;
  transition:all 0.3s;line-height:1;
  text-shadow:0 0 6px rgba(0,0,0,0.5);
}
.book .book-star:hover{transform:scale(1.3)}

/* Book colors by dimension */
.book.dim-culture{background:linear-gradient(180deg,#3b82f6,#1d4ed8)}
.book.dim-institution{background:linear-gradient(180deg,#8b5cf6,#6d28d9)}
.book.dim-personal{background:linear-gradient(180deg,#f59e0b,#d97706)}
.book.dim-computation{background:linear-gradient(180deg,#10b981,#059669)}

/* Themed book variations */
.theme-paper .book.dim-culture{background:linear-gradient(180deg,#2563eb,#1e40af)}
.theme-paper .book.dim-institution{background:linear-gradient(180deg,#7c3aed,#5b21b6)}
.theme-paper .book.dim-personal{background:linear-gradient(180deg,#d97706,#b45309)}
.theme-paper .book.dim-computation{background:linear-gradient(180deg,#059669,#047857)}

.theme-cool .book.dim-culture{background:linear-gradient(180deg,#60a5fa,#3b82f6)}
.theme-cool .book.dim-institution{background:linear-gradient(180deg,#a78bfa,#8b5cf6)}
.theme-cool .book.dim-personal{background:linear-gradient(180deg,#fbbf24,#f59e0b)}
.theme-cool .book.dim-computation{background:linear-gradient(180deg,#34d399,#10b981)}

/* Favorite glow */
.book.favorited{
  box-shadow:0 0 16px rgba(255,215,0,0.35),0 0 32px rgba(255,215,0,0.12);
}
.theme-paper .book.favorited{
  box-shadow:0 0 16px rgba(139,69,19,0.25),0 0 32px rgba(139,69,19,0.1);
}
.theme-cool .book.favorited{
  box-shadow:0 0 16px rgba(74,144,217,0.3),0 0 32px rgba(74,144,217,0.1);
}

/* ===== Empty State ===== */
.empty-state{text-align:center;color:var(--muted);padding:40px}
.empty-state .icon{font-size:48px;display:block;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:14px}

/* ===== Book Detail Modal ===== */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  z-index:500;align-items:center;justify-content:center;
  padding:20px;animation:fadeIn 0.3s ease;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:32px;max-width:480px;
  width:100%;box-shadow:var(--shadow-lg);
  animation:scaleIn 0.3s ease;position:relative;
}
.modal .modal-close{
  position:absolute;top:14px;right:16px;font-size:22px;
  cursor:pointer;color:var(--muted);transition:color 0.2s;
  background:none;border:none;font-family:inherit;
}
.modal .modal-close:hover{color:var(--text)}
.modal .modal-dot{
  width:48px;height:48px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:14px;
}
.modal .modal-dot.culture{background:rgba(59,130,246,0.15);color:var(--dim-blue)}
.modal .modal-dot.institution{background:rgba(139,92,246,0.15);color:var(--dim-purple)}
.modal .modal-dot.personal{background:rgba(245,158,11,0.15);color:var(--dim-gold)}
.modal .modal-dot.computation{background:rgba(16,185,129,0.15);color:var(--dim-green)}
.modal h2{font-size:20px;font-weight:700;margin-bottom:6px}
.modal .modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.modal .modal-meta span{padding:2px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;background:var(--gold-lt);color:var(--gold)}
.modal .modal-desc{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:18px}
.modal .modal-dim{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal .modal-actions{display:flex;gap:10px}
.modal .modal-actions a,.modal .modal-actions button{
  padding:10px 24px;border-radius:var(--radius-pill);font-size:14px;
  font-weight:600;text-decoration:none;text-align:center;
  transition:all 0.2s;font-family:inherit;
}
.modal .btn-primary-custom{
  background:linear-gradient(135deg,var(--gold),var(--accent2));
  color:#fff;border:none;cursor:pointer;flex:1;
}
.modal .btn-primary-custom:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.modal .btn-outline-custom{
  background:transparent;border:1px solid var(--border);
  color:var(--text);cursor:pointer;
}
.modal .btn-outline-custom:hover{background:var(--gold-lt);border-color:var(--gold)}

/* ===== Responsive ===== */
@media(max-width:700px){
  .navbar{padding:0 16px}
  .nav-links a{padding:6px 10px;font-size:12px}
  .container{padding:80px 14px 30px}
  .page-header h1{font-size:28px}
  .bookshelf{grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:12px;padding:20px 14px}
  .book{height:170px;font-size:11px}
  .modal{padding:24px}
  .filter-bar{padding:10px 14px}
  .filter-tab{padding:5px 12px;font-size:12px}
}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes bookEnter{from{opacity:0;transform:translateY(20px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}
.book{animation:bookEnter 0.4s ease both}
</style>
</head>
<body>

<div id="navbar"></div>
<script src="/js/navbar.js"></script>

<div class="container">
  <div class="page-header">
    <h1>&#128218; 我的藏书阁</h1>
    <p class="sub">将课程视为藏书，构建你的专属知识书架</p>
    <div class="stats" id="statsBar">
      已收藏 <strong id="favCount">0</strong> 门 / 共 <strong id="totalCount">29</strong> 门
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">&#128269; 筛选:</span>
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">全部 <span class="count" id="fc-all">29</span></button>
    <button class="filter-tab" data-filter="favorited" onclick="setFilter('favorited')">&#11088; 已收藏 <span class="count" id="fc-fav">0</span></button>
    <span style="color:var(--muted);font-size:12px;margin:0 4px">|</span>
    <button class="filter-tab" data-filter="culture" onclick="setFilter('culture')">&#129504; 文化</button>
    <button class="filter-tab" data-filter="institution" onclick="setFilter('institution')">&#127963; 机构</button>
    <button class="filter-tab" data-filter="personal" onclick="setFilter('personal')">&#128161; 个人</button>
    <button class="filter-tab" data-filter="computation" onclick="setFilter('computation')">&#128187; 计算</button>
  </div>

  <div class="bookshelf" id="bookshelf"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-dot" id="modalIcon">&#128218;</div>
    <h2 id="modalTitle">课程名称</h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-desc" id="modalDesc">课程简介</div>
    <div class="modal-dim" id="modalDim">维度信息</div>
    <div class="modal-actions">
      <a class="btn-primary-custom" id="modalLink" href="#">&#128279; 查看课程详情</a>
      <button class="btn-outline-custom" id="modalFavBtn" onclick="toggleFavFromModal()">&#11088; 收藏</button>
    </div>
  </div>
</div>

<script>
/* ===== Course Data ===== */
var DIM_MAP = {culture:"文化",institution:"机构",personal:"个人",computation:"计算"};
var DIM_ICONS = {culture:"&#129504;",institution:"&#127963;",personal:"&#128161;",computation:"&#128187;"};

/* ===== State ===== */
var courses = [];
var favorites = [];
var currentFilter = "all";
var currentTheme = 0;
var currentUser = null;
var modalCourseId = null;

var THEMES = ["theme-dark-gold","theme-paper","theme-cool"];
var THEME_LABELS = ["&#10024; 暗调鎏金","&#128196; 古籍纸","&#128160; 学术冷调"];

/* ===== Init ===== */
// 响应共享导航栏的主题切换
window.onThemeChange = function(dark) {
  currentTheme = dark ? 0 : 1;
  try { applyTheme(); } catch(e) {}
};
function initTheme(){
  try {
    var saved = localStorage.getItem("theme");
    currentTheme = (saved === "dark") ? 0 : 1;
    applyTheme();
  } catch(e) { console.log('theme init deferred'); }
}
function applyTheme(){
  for(var i=0;i<THEMES.length;i++) document.body.classList.remove(THEMES[i]);
  document.body.classList.add(THEMES[currentTheme]);
  var btn = document.getElementById("themeBtn");
  if(btn) btn.innerHTML = THEME_LABELS[currentTheme].split(" ")[0];
  localStorage.setItem("theme", (currentTheme === 0 || currentTheme === 2) ? "dark" : "light");
  if(courses.length > 0) renderShelf();
}
function cycleTheme(){
  currentTheme = (currentTheme + 1) % THEMES.length;
  applyTheme();
}

/* ===== Favorites (localStorage) ===== */
function loadFavorites(){
  try{
    var data = localStorage.getItem("libraryFavorites");
    favorites = data ? JSON.parse(data) : [];
  }catch(e){favorites=[]}
}
function saveFavorites(){
  localStorage.setItem("libraryFavorites", JSON.stringify(favorites));
}
function isFavorited(id){
  for(var i=0;i<favorites.length;i++){if(favorites[i]===id)return true;}
  return false;
}
function toggleFavorite(id, doRender){
  var idx = -1;
  for(var i=0;i<favorites.length;i++){if(favorites[i]===id){idx=i;break;}}
  if(idx >= 0) favorites.splice(idx, 1);
  else favorites.push(id);
  saveFavorites();
  if(doRender !== false) renderShelf();
  updateStats();
}

/* ===== Fetch courses ===== */
function loadCourses(){
  // 从API加载真实数据
  fetch("/api/auth/status").then(function(r){return r.json()}).then(function(d){
    if(d.authenticated){
      currentUser = d.user;
      var el = document.getElementById("ua");
      if(currentUser.display_name) el.textContent = currentUser.display_name[0];
      else if(currentUser.username) el.textContent = currentUser.username[0];
    }
  }).catch(function(){});
  fetch("/api/courses").then(function(r){return r.json()}).then(function(d){
    if(d.success && d.courses && d.courses.length > 0){
      courses = d.courses;
    } else {
      courses = [];
    }
    document.getElementById("totalCount").textContent = courses.length;
    updateFilterCounts();
    renderShelf();
    updateStats();
  }).catch(function(){
    courses = [];
    document.getElementById("totalCount").textContent = "0";
    document.getElementById("bookshelf").innerHTML = '<div class="empty-state"><span class="icon">&#128237;</span><p>加载课程数据失败</p><p style="font-size:13px;margin-top:6px;color:var(--muted)">请检查后端服务是否启动</p></div>';
  });
}

/* ===== Filter ===== */
function setFilter(filter){
  currentFilter = filter;
  var tabs = document.querySelectorAll(".filter-tab");
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-filter") === filter);
  }
  renderShelf();
}

function updateFilterCounts(){
  var fcAll = document.getElementById("fc-all");
  var fcFav = document.getElementById("fc-fav");
  if(fcAll) fcAll.textContent = courses.length;
  if(fcFav) fcFav.textContent = favorites.length;
}

function getFilteredCourses(){
  if(currentFilter === "all") return courses.slice();
  if(currentFilter === "favorited"){
    var result = [];
    for(var i=0;i<courses.length;i++){if(isFavorited(courses[i].id)) result.push(courses[i]);}
    return result;
  }
  var dimName = DIM_MAP[currentFilter] || "";
  if(!dimName) return [];
  var result = [];
  for(var i=0;i<courses.length;i++){
    var dims = courses[i].dimensions || [];
    for(var j=0;j<dims.length;j++){
      if(dims[j] === dimName){result.push(courses[i]);break;}
    }
  }
  return result;
}

/* ===== Render ===== */
function renderShelf(){
  var shelf = document.getElementById("bookshelf");
  var filtered = getFilteredCourses();

  if(filtered.length === 0){
    shelf.className = "bookshelf empty";
    shelf.innerHTML = '<div class="empty-state"><span class="icon">&#128237;</span><p>暂无匹配的藏书</p><p style="font-size:13px;margin-top:6px;color:var(--muted)">试试调整筛选条件</p></div>';
    return;
  }

  shelf.className = "bookshelf";

  var themeClass = THEMES[currentTheme];
  var html = "";

  for(var i=0;i<filtered.length;i++){
    var course = filtered[i];
    var dimClass = getDimClass(course);
    var fav = isFavorited(course.id);
    var name = course.name;
    var shortName = name.length > 6 ? name.slice(0,5) + "…" : name;
    html += '<div class="book ' + dimClass + ' ' + (fav?"favorited":"") + ' ' + themeClass + '"';
    html += ' style="animation-delay:' + (i*0.03) + 's"';
    html += ' onclick="openModal(' + course.id + ')" title="' + name + '">';
    html += '<div class="book-spine"></div>';
    html += '<span class="book-star" onclick="event.stopPropagation();toggleFavorite(' + course.id + ')" title="' + (fav?"取消收藏":"收藏") + '">';
    html += fav ? "&#11088;" : "&#9734;";
    html += '</span>';
    html += '<span class="book-title">' + shortName + '</span>';
    html += '</div>';
  }

  shelf.innerHTML = html;
  updateFilterCounts();
}

function getDimClass(course){
  var dims = course.dimensions || [];
  if(dims.indexOf("文化") >= 0) return "dim-culture";
  if(dims.indexOf("机构") >= 0) return "dim-institution";
  if(dims.indexOf("个人") >= 0) return "dim-personal";
  if(dims.indexOf("计算") >= 0) return "dim-computation";
  return "dim-culture";
}

/* ===== Stats ===== */
function updateStats(){
  var count = 0;
  for(var i=0;i<courses.length;i++){if(isFavorited(courses[i].id)) count++;}
  var el = document.getElementById("favCount");
  if(el) el.textContent = count;
  var fcFav = document.getElementById("fc-fav");
  if(fcFav) fcFav.textContent = count;
}

/* ===== Modal ===== */
function openModal(id){
  var course = null;
  for(var i=0;i<courses.length;i++){if(courses[i].id === id){course=courses[i];break;}}
  if(!course) return;
  modalCourseId = id;

  var dims = course.dimensions || [];
  var dimKey = "culture";
  for(var k in DIM_MAP){
    if(dims.indexOf(DIM_MAP[k]) >= 0){dimKey=k;break;}
  }
  var dimIcon = DIM_ICONS[dimKey] || "&#128218;";
  var fav = isFavorited(id);

  var iconEl = document.getElementById("modalIcon");
  iconEl.className = "modal-dot " + dimKey;
  iconEl.innerHTML = dimIcon;

  document.getElementById("modalTitle").textContent = course.name;

  var metaHtml = "";
  if(course.category) metaHtml += '<span>' + course.category + '</span>';
  metaHtml += '<span>' + (course.credit||0) + ' 学分</span>';
  if(course.clc_number) metaHtml += '<span>' + course.clc_number + '</span>';
  document.getElementById("modalMeta").innerHTML = metaHtml;

  document.getElementById("modalDesc").textContent = course.desc || "暂无简介";

  var dimHtml = "";
  for(var i=0;i<dims.length;i++){
    if(i>0) dimHtml += " &nbsp; ";
    dimHtml += dimIcon + " " + dims[i];
  }
  document.getElementById("modalDim").innerHTML = dimHtml;

  var link = document.getElementById("modalLink");
  link.href = "/course/" + course.id;

  var favBtn = document.getElementById("modalFavBtn");
  favBtn.innerHTML = fav ? "&#11088; 已收藏" : "&#9734; 收藏";
  favBtn.style.opacity = fav ? "1" : "0.7";

  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
  modalCourseId = null;
}

function toggleFavFromModal(){
  if(modalCourseId === null) return;
  toggleFavorite(modalCourseId, true);
  var fav = isFavorited(modalCourseId);
  var btn = document.getElementById("modalFavBtn");
  btn.innerHTML = fav ? "&#11088; 已收藏" : "&#9734; 收藏";
  btn.style.opacity = fav ? "1" : "0.7";
}

/* ===== Auth ===== */
function toggleUserMenu(){
  var ud = document.getElementById("ud");
  ud.classList.toggle("show");
}
function logout(){
  fetch("/api/auth/logout",{method:"POST"}).catch(function(){}).then(function(){window.location.reload();});
}

/* ===== Init ===== */
initTheme();
loadFavorites();
loadCourses();

document.addEventListener("click", function(e){
  var ud = document.getElementById("ud");
  var ua = document.getElementById("ua");
  if(ud && ua && ud.classList.contains("show") && !ua.contains(e.target)) ud.classList.remove("show");
});

document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});
document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeModal();
});
</script>
</body>
</html>
